<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" href="https://image2url.com/r2/default/images/1774579668410-55391703-7184-4252-858c-3690c84902bc.jpeg" type="image/png">
    <link rel="apple-touch-icon" href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fpng.pngtree.com%2Fpng-vector%2F20220129%2Fourlarge%2Fpngtree-fractured-limb-icon-for-healthcare-and-trauma-treatment-vector-png-image_44257800.jpg&f=1&ipt=cb13b10d918d020004f64cef019b14509eb830a4dc23867784622a4e624572b5">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Muscles</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f4f1ea">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2c2825;
            --table-bg: #fdfdfa;
            --th-bg: #e6e2d3;
            --border-color: #8c7b68;
            --border-dark: #2c2825;
            --cell-focus: #ebe7d9;
            --section-bg: #dcd7c6;
            --btn-hover-bg: #2c2825;
            --btn-hover-text: #f4f1ea;
            --danger-color: #8b0000;
            --danger-hover: #ffffff;
            --action-color: #2980b9;
            --fs-btn-bg: #e6dfcd;
            --fs-btn-hover: #d4ccb6;
        }

        body.dark-mode {
            --bg-color: #1a1816;
            --text-color: #dcd7c6;
            --table-bg: #24221f;
            --th-bg: #332f2a;
            --border-color: #5c5346;
            --border-dark: #8c7b68;
            --cell-focus: #3a352f;
            --section-bg: #3f3933;
            --btn-hover-bg: #dcd7c6;
            --btn-hover-text: #1a1816;
            --danger-color: #cc3333;
            --danger-hover: #1a1816;
            --action-color: #5dade2;
            --fs-btn-bg: #332f2b;
            --fs-btn-hover: #443e39;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Amiri', serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px double var(--border-dark); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .main-title { margin: 0; font-size: 2.2em; font-family: 'Crimson Text', serif; }
        .corner-controls { display: flex; gap: 10px; }

        .sub-controls {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
        }

        .btn {
            background-color: transparent; border: 1px solid var(--text-color); color: var(--text-color);
            padding: 8px 12px; font-family: 'Amiri', serif; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: bold;
        }

        .btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        .back-btn { border-style: dashed; }
        .back-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
        .fs-btn { background-color: var(--fs-btn-bg); border: 1px solid var(--border-color); font-family: 'Crimson Text', 'Amiri', serif; }
        .fs-btn:hover { background-color: var(--fs-btn-hover); color: var(--text-color); }
        .btn-section { border-width: 2px; }
        .btn-data { border-color: var(--action-color); color: var(--action-color); }
        .btn-data:hover { background-color: var(--action-color); color: #fff; }
        .btn-clear { border-color: var(--danger-color); color: var(--danger-color); }
        .btn-clear:hover { background-color: var(--danger-color); color: var(--danger-hover); }
        
        #pdf-content { width: 100%; background-color: var(--bg-color); }

        table {
            width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Crimson Text', serif;
            background-color: var(--table-bg); border: 2px solid var(--border-dark); transition: background-color 0.3s;
        }

        th, td {
            border: 1px solid var(--border-color); padding: 10px 8px; vertical-align: middle;
            line-height: 1.4; font-size: 1.1em; word-wrap: break-word; overflow-wrap: break-word;
        }

        th {
            background-color: var(--th-bg); font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; border-bottom: 2px solid var(--border-dark); text-align: center;
        }
        
        .section-header {
            background-color: var(--section-bg); font-weight: bold; text-align: center; font-size: 1.2em;
            letter-spacing: 1px; text-transform: uppercase; color: var(--text-color);
            border-top: 2px solid var(--border-dark); border-bottom: 2px solid var(--border-dark);
        }

        td[contenteditable="true"] { outline: none; }
        td[contenteditable="true"]:focus { background-color: var(--cell-focus); }
        
        .action-column { text-align: center; vertical-align: middle; user-select: none; }

        /* تنسيق أزرار ومقابض التحكم */
        .action-btn {
            background: none; border: 1px solid var(--border-dark); color: var(--text-color);
            padding: 4px 6px; margin: 2px 1px; font-size: 12px; cursor: pointer; transition: 0.2s; display: inline-block;
        }
        .action-btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        
        .btn-delete-row { border-color: var(--danger-color); color: var(--danger-color); }
        .btn-delete-row:hover { background-color: var(--danger-color); color: var(--danger-hover); }

        /* مقابض السحب */
        .drag-handle { cursor: grab; font-size: 16px; font-weight: bold; padding: 2px 6px; border-style: dashed;}
        .drag-handle:active { cursor: grabbing; }
        .region-handle { background-color: var(--section-bg); }

        /* تأثيرات السحب */
        .sortable-ghost { opacity: 0.4; background-color: var(--cell-focus); }
        .sortable-drag { box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        @media screen and (max-width: 768px) {
            body { padding: 15px 5px; } 
            .main-header { flex-direction: column; align-items: stretch; text-align: center; }
            .corner-controls { justify-content: center; }
            .corner-controls button { flex: 1; }
            .sub-controls { justify-content: center; gap: 8px; }
            .sub-controls button { flex: 1 1 40%; font-size: 12px; padding: 6px 8px; }
            th, td { padding: 4px 2px; font-size: 11px; line-height: 1.2; }
            th { font-size: 9px; }
            .section-header { font-size: 12px; }
            .action-btn { padding: 2px 4px; font-size: 9px; display: block; width: 100%; box-sizing: border-box; }
            .drag-handle { display: block; width: 100%; margin-bottom: 2px;}
        }

        @media print {
            .main-header, .sub-controls, .action-column { display: none !important; }
            table { font-size: 12pt; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="main-header">
        <h2 class="main-title">Anatomy Muscles</h2>
        <div class="corner-controls">
            <button class="btn fs-btn" id="fs-btn" onclick="toggleFullScreen()" title="Toggle Full Screen">Full Screen</button>
            <button class="btn back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
        </div>
    </div>

    <div class="sub-controls">
        <button class="btn btn-section" onclick="addSection()">Add Region</button>
        <button class="btn" onclick="addRow()">Add Muscle</button>
        <button class="btn btn-data" onclick="exportPDF()">Export PDF</button>
        <button class="btn btn-data" onclick="exportDataBackup()">Export</button>
        <button class="btn btn-data" onclick="importDataBackup()">Import</button>
        <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
    </div>

    <div id="pdf-content">
        <table id="anatomyTable">
            <thead>
                <tr>
                    <th style="width: 15%;">Muscle</th>
                    <th style="width: 20%;">Origin</th>
                    <th style="width: 20%;">Insertion</th>
                    <th style="width: 20%;">Action</th>
                    <th style="width: 15%;">Nerve supply</th>
                    <th class="action-column" style="width: 10%;">Control</th>
                </tr>
            </thead>
            </table>
    </div>

    <script>
        const table = document.getElementById('anatomyTable');
        let tableSortable; // لحفظ إعدادات سحب الأقسام (Regions)

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const fsBtn = document.getElementById('fs-btn');
            if (document.fullscreenElement) { fsBtn.innerText = "Exit Full Screen"; } 
            else { fsBtn.innerText = "Full Screen"; }
        });

        function loadTheme() {
            if (localStorage.getItem('sharedTheme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector("meta[name=theme-color]").setAttribute("content", "#1a1816");
            }
        }

        // حفظ البيانات (نحفظ الآن كل الـ tbodys وليس واحد فقط)
        function saveData() { 
            const tbodys = document.querySelectorAll('#anatomyTable tbody');
            let dataToSave = '';
            tbodys.forEach(tb => { dataToSave += tb.outerHTML; });
            localStorage.setItem('lowerLimbAnatomyData', dataToSave); 
        }

        function loadData() {
            const savedData = localStorage.getItem('lowerLimbAnatomyData');
            // مسح أي tbodys موجودة حالياً
            document.querySelectorAll('#anatomyTable tbody').forEach(tb => tb.remove());

            if (savedData) { 
                // خدعة لتحويل النص إلى عناصر HTML آمنة للجدول
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = `<table>${savedData}</table>`;
                const loadedTbodys = tempDiv.querySelectorAll('tbody');
                
                loadedTbodys.forEach(tb => {
                    table.appendChild(tb);
                });
                initSortables();
            } else { 
                addSection("Click to edit Region Name"); 
                addRow(); 
            }
        }

        // تفعيل السحب والإفلات
        function initSortables() {
            // 1. سحب الأقسام (Regions) بكامل عضلاتها (سحب الـ tbody بالكامل)
            if(tableSortable) tableSortable.destroy();
            tableSortable = new Sortable(table, {
                animation: 200,
                handle: '.region-handle', // المقبض المخصص للأقسام
                draggable: 'tbody',
                onEnd: saveData
            });

            // 2. سحب العضلات (Rows) داخل وخارج الأقسام
            document.querySelectorAll('#anatomyTable tbody').forEach(tbody => {
                // منع تكرار التفعيل
                if(!tbody.dataset.sortableInit) {
                    new Sortable(tbody, {
                        group: 'muscles-group', // يسمح بنقل العضلة من قسم إلى قسم آخر!
                        animation: 150,
                        handle: '.row-handle', // المقبض المخصص للعضلات
                        draggable: '.muscle-row',
                        onEnd: saveData
                    });
                    tbody.dataset.sortableInit = "true";
                }
            });
        }

        function addSection(defaultText = "Click to edit Region Name") {
            const newTbody = document.createElement('tbody');
            const newRow = document.createElement('tr');
            
            let cell = document.createElement('td');
            cell.colSpan = 5; 
            cell.contentEditable = "true";
            cell.className = "section-header"; 
            cell.innerText = defaultText;

            let controlCell = document.createElement('td');
            controlCell.className = "action-column";
            // زر سحب القسم + زر حذفه بالكامل
            controlCell.innerHTML = `
                <span class="action-btn drag-handle region-handle" title="Drag entire Region">☰</span>
                <button class="action-btn btn-delete-row" onclick="deleteRegion(this)" title="Delete Region">X</button>
            `;

            newRow.appendChild(cell);
            newRow.appendChild(controlCell);
            newTbody.appendChild(newRow);
            table.appendChild(newTbody);
            
            initSortables();
            saveData();
        }

        function addRow() {
            const tbodys = document.querySelectorAll('#anatomyTable tbody');
            if(tbodys.length === 0) addSection();
            const lastTbody = document.querySelectorAll('#anatomyTable tbody')[document.querySelectorAll('#anatomyTable tbody').length - 1];

            const newRow = document.createElement('tr');
            newRow.className = "muscle-row";
            for (let i = 0; i < 5; i++) { 
                let cell = document.createElement('td'); 
                cell.contentEditable = "true"; 
                newRow.appendChild(cell);
            }
            let controlCell = document.createElement('td');
            controlCell.className = "action-column";
            controlCell.innerHTML = `
                <span class="action-btn drag-handle row-handle" title="Drag Muscle">☰</span>
                <button class="action-btn btn-delete-row" onclick="deleteRow(this)" title="Delete Muscle">X</button>
            `;
            
            newRow.appendChild(controlCell);
            lastTbody.appendChild(newRow);
            
            saveData();
        }

        function deleteRow(btn) {
            if(confirm("Delete this muscle?")) {
                const row = btn.closest('tr');
                row.remove(); 
                saveData();
            }
        }

        function deleteRegion(btn) {
            if(confirm("WARNING: This will delete the entire Region and ALL its muscles. Are you sure?")) {
                const tbody = btn.closest('tbody');
                tbody.remove();
                saveData();
            }
        }

        function clearData() {
            if(confirm("Delete all data and start over?")) {
                localStorage.removeItem('lowerLimbAnatomyData'); 
                document.querySelectorAll('#anatomyTable tbody').forEach(tb => tb.remove());
                addSection("Click to edit Region Name"); 
                addRow();
            }
        }

        function exportDataBackup() {
            const currentData = localStorage.getItem('lowerLimbAnatomyData') || "";
            const blob = new Blob([currentData], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Anatomy_Backup.txt';
            link.click();
        }

        function importDataBackup() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.txt';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = event => {
                    localStorage.setItem('lowerLimbAnatomyData', event.target.result);
                    loadData();
                    alert("Data imported successfully!");
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function exportPDF() {
            const element = document.getElementById('pdf-content');
            const actionCells = document.querySelectorAll('.action-column');
            actionCells.forEach(cell => cell.style.display = 'none');

            const wasDarkMode = document.body.classList.contains('dark-mode');
            if (wasDarkMode) document.body.classList.remove('dark-mode');

            const opt = {
                margin: 10, filename: 'Anatomy_Lower_Limb.pdf', image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                actionCells.forEach(cell => cell.style.display = '');
                if (wasDarkMode) document.body.classList.add('dark-mode');
            });
        }

        // تحديث الحفظ عند التعديل النصي
        document.getElementById('anatomyTable').addEventListener('input', saveData);
        window.onload = () => { loadTheme(); loadData(); };
    </script>
</body>
</html>

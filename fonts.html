<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="https://image2url.com/r2/default/images/1774579668410-55391703-7184-4252-858c-3690c84902bc.jpeg" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الخطوط العربية</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f4f1ea">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&family=Tajawal:wght@400;300;700&family=Almarai:wght@400;300;700;800&family=IBM+Plex+Sans+Arabic:wght@400;300;700&family=Readex+Pro:wght@400;300;700&family=El+Messiri:wght@400;700&family=Lemonada:wght@400;700&family=Changa:wght@400;700&family=Lalezar&family=Reem+Kufi:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Harmattan:wght@400;700&family=Vibes&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2c2825;
            --table-bg: #fdfdfa;
            --th-bg: #e6e2d3;
            --border-color: #8c7b68;
            --border-dark: #2c2825;
            --cell-focus: #ebe7d9;
            --section-bg: #dcd7c6;
            --btn-hover-bg: #2c2825;
            --btn-hover-text: #f4f1ea;
            --action-color: #2980b9;
            --fs-btn-bg: #e6dfcd;
            --fs-btn-hover: #d4ccb6;
        }

        body.dark-mode {
            --bg-color: #1a1816;
            --text-color: #dcd7c6;
            --table-bg: #24221f;
            --th-bg: #332f2a;
            --border-color: #5c5346;
            --border-dark: #8c7b68;
            --cell-focus: #3a352f;
            --section-bg: #3f3933;
            --btn-hover-bg: #dcd7c6;
            --btn-hover-text: #1a1816;
            --action-color: #5dade2;
            --fs-btn-bg: #332f2b;
            --fs-btn-hover: #443e39;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color); font-family: 'Amiri', serif;
            margin: 0; padding: 20px; transition: background-color 0.3s, color 0.3s;
        }

        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px double var(--border-dark); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .main-title { margin: 0; font-size: 2.2em; font-family: 'Amiri', serif; text-align: right; }
        .corner-controls { display: flex; gap: 10px; }

        .btn { background-color: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 8px 12px; font-family: 'Amiri', serif; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: bold; border-radius: 4px; text-decoration: none; text-align: center;}
        .btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        .back-btn { border-style: dashed; }
        .back-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
        .fs-btn { background-color: var(--fs-btn-bg); border: 1px solid var(--border-color); font-family: 'Amiri', serif; }
        .fs-btn:hover { background-color: var(--fs-btn-hover); color: var(--text-color); }
        .btn-data { border-color: var(--action-color); color: var(--action-color); }
        .btn-data:hover { background-color: var(--action-color); color: #fff; }

        .top-controls-wrapper { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; gap: 15px; }
        
        .input-container { width: 100%; max-width: 800px; }
        .main-input { width: 100%; box-sizing: border-box; padding: 15px; font-size: 1.5em; font-family: 'Amiri', serif; background-color: var(--table-bg); color: var(--text-color); border: 2px solid var(--border-dark); border-radius: 4px; text-align: center; outline: none; transition: background-color 0.3s; }
        .main-input:focus { background-color: var(--cell-focus); border-style: dashed; }

        .size-controls { display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; font-size: 1.1em; background-color: var(--th-bg); padding: 10px 20px; border-radius: 8px; border: 1px dashed var(--border-dark); }
        .size-controls .btn { padding: 4px 15px; font-size: 1.2em; }
        .size-display { display: inline-block; min-width: 50px; text-align: center; background-color: var(--table-bg); padding: 5px 10px; border: 1px solid var(--border-color); border-radius: 4px; }

        .fonts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .font-card { background-color: var(--table-bg); border: 2px solid var(--border-dark); display: flex; flex-direction: column; transition: background-color 0.3s; }
        
        .font-name { background-color: var(--section-bg); font-weight: bold; text-align: center; font-size: 1.2em; padding: 10px; border-bottom: 2px solid var(--border-dark); }
        
        .variants-container { display: flex; justify-content: center; gap: 8px; padding: 10px; background-color: var(--th-bg); flex-wrap: wrap; border-bottom: 1px dashed var(--border-color); }
        .variant-btn { background-color: transparent; border: 1px solid var(--border-dark); color: var(--text-color); padding: 4px 10px; font-family: 'Amiri', serif; font-size: 13px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .variant-btn:hover { background-color: var(--border-color); }
        .variant-btn.active { background-color: var(--action-color); color: #fff; border-color: var(--action-color); font-weight: bold; }

        .font-preview { padding: 20px; font-size: 32px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; word-wrap: break-word; flex-grow: 1; line-height: 1.5; transition: font-size 0.2s; }
        
        .card-footer { display: flex; justify-content: space-between; padding: 10px; border-top: 1px dashed var(--border-color); background-color: var(--th-bg); gap: 10px; }
        .card-footer .btn { flex: 1; font-size: 13px; }

        @media screen and (max-width: 768px) {
            .main-header { flex-direction: column-reverse; align-items: stretch; text-align: center; }
            .main-title { text-align: center; font-size: 1.8em; } 
            .fonts-grid { grid-template-columns: 1fr; }
        }

        /* تعريف خط كوكب مونو محلياً */
        @font-face { font-family: 'Kawkab-Regular'; src: url('fonts/Kawkab Mono/KawkabMono-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Kawkab-Bold'; src: url('fonts/Kawkab Mono/KawkabMono-Bold.ttf') format('truetype'); }
        @font-face { font-family: 'Kawkab-Light'; src: url('fonts/Kawkab Mono/KawkabMono-Light.ttf') format('truetype'); }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="corner-controls">
            <button class="btn back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
            <button class="btn fs-btn" id="fs-btn" onclick="toggleFullScreen()">Full Screen</button>
        </div>
        <h2 class="main-title">مكتبة الخطوط العربية</h2>
    </div>

    <div class="top-controls-wrapper">
        <div class="input-container">
            <input type="text" id="mainInput" class="main-input" value="" placeholder="اكتب جملة لتجربتها على جميع الخطوط...">
        </div>
        <div class="size-controls">
            <span>حجم الخط:</span>
            <button class="btn" onclick="changeFontSize(4)">+</button>
            <span class="size-display" id="fontSizeDisplay">20px</span>
            <button class="btn" onclick="changeFontSize(-4)">-</button>
        </div>
    </div>

    <div class="fonts-grid" id="fontsGrid"></div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function loadTheme() {
            if (localStorage.getItem('sharedTheme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        const defaultText = "التصميم هو السفير الصامت لعلامتك التجارية";
        const mainInput = document.getElementById('mainInput');
        const fontsGrid = document.getElementById('fontsGrid');
        let currentFontSize = window.innerWidth <= 768 ? 26 : 20; 

        function changeFontSize(step) {
            currentFontSize += step;
            if (currentFontSize < 14) currentFontSize = 14;
            if (currentFontSize > 120) currentFontSize = 120;
            document.getElementById('fontSizeDisplay').innerText = currentFontSize + 'px';
            const previews = document.querySelectorAll('.font-preview');
            previews.forEach(p => p.style.fontSize = currentFontSize + 'px');
        }

        // --- القائمة المحدثة: "عادي" هو الأول دائماً + خطوط جوجل الجديدة ---
        const fonts = [
            { 
                name: 'خط كايرو (Cairo)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Cairo',
                externalDownload: 'https://fonts.google.com/download?family=Cairo',
                variants: [
                    { name: 'عادي', family: 'Cairo', weight: '400' },
                    { name: 'عريض', family: 'Cairo', weight: '700' },
                    { name: 'أسود', family: 'Cairo', weight: '900' }
                ]
            },
            { 
                name: 'خط تجوال (Tajawal)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Tajawal',
                externalDownload: 'https://fonts.google.com/download?family=Tajawal',
                variants: [
                    { name: 'عادي', family: 'Tajawal', weight: '400' },
                    { name: 'خفيف', family: 'Tajawal', weight: '300' },
                    { name: 'عريض', family: 'Tajawal', weight: '700' }
                ]
            },
            { 
                name: 'خط المراعي (Almarai)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Almarai',
                externalDownload: 'https://fonts.google.com/download?family=Almarai',
                variants: [
                    { name: 'عادي', family: 'Almarai', weight: '400' },
                    { name: 'عريض', family: 'Almarai', weight: '700' },
                    { name: 'أسود', family: 'Almarai', weight: '800' }
                ]
            },
            { 
                name: 'آي بي إم بلكس (IBM Plex Arabic)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/IBM+Plex+Sans+Arabic',
                externalDownload: 'https://fonts.google.com/download?family=IBM+Plex+Sans+Arabic',
                variants: [
                    { name: 'عادي', family: 'IBM Plex Sans Arabic', weight: '400' },
                    { name: 'خفيف', family: 'IBM Plex Sans Arabic', weight: '300' },
                    { name: 'عريض', family: 'IBM Plex Sans Arabic', weight: '700' }
                ]
            },
            { 
                name: 'ريديكس برو (Readex Pro)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Readex+Pro',
                externalDownload: 'https://fonts.google.com/download?family=Readex+Pro',
                variants: [
                    { name: 'عادي', family: 'Readex Pro', weight: '400' },
                    { name: 'خفيف', family: 'Readex Pro', weight: '300' },
                    { name: 'عريض', family: 'Readex Pro', weight: '700' }
                ]
            },
            { 
                name: 'كوكب مونو (Kawkab Mono)', source: 'Makkuk', sourceUrl: 'https://makkuk.com/kawkab-mono/',
                externalDownload: 'https://makkuk.com/kawkab-mono/downloads/kawkab-mono-0.500.zip',
                variants: [
                    { name: 'عادي', family: 'Kawkab-Regular', weight: 'normal' },
                    { name: 'خفيف', family: 'Kawkab-Light', weight: 'normal' },
                    { name: 'عريض', family: 'Kawkab-Bold', weight: 'normal' }
                ]
            },
            { 
                name: 'المسيري (El Messiri)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/El+Messiri',
                externalDownload: 'https://fonts.google.com/download?family=El+Messiri',
                variants: [ { name: 'عادي', family: 'El Messiri', weight: '400' }, { name: 'عريض', family: 'El Messiri', weight: '700' } ]
            },
            { 
                name: 'ليمونادة (Lemonada)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Lemonada',
                externalDownload: 'https://fonts.google.com/download?family=Lemonada',
                variants: [ { name: 'عادي', family: 'Lemonada', weight: '400' }, { name: 'عريض', family: 'Lemonada', weight: '700' } ]
            },
            { 
                name: 'تشانغا (Changa)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Changa',
                externalDownload: 'https://fonts.google.com/download?family=Changa',
                variants: [ { name: 'عادي', family: 'Changa', weight: '400' }, { name: 'عريض', family: 'Changa', weight: '700' } ]
            },
            { 
                name: 'لاليزار (Lalezar)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Lalezar',
                externalDownload: 'https://fonts.google.com/download?family=Lalezar',
                variants: [ { name: 'عادي', family: 'Lalezar', weight: '400' } ]
            },
            { 
                name: 'ريم كوفي (Reem Kufi)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Reem+Kufi',
                externalDownload: 'https://fonts.google.com/download?family=Reem+Kufi',
                variants: [ { name: 'عادي', family: 'Reem Kufi', weight: '400' }, { name: 'عريض', family: 'Reem Kufi', weight: '700' } ]
            },
            { 
                name: 'بالو بهيجان (Baloo Bhaijaan 2)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Baloo+Bhaijaan+2',
                externalDownload: 'https://fonts.google.com/download?family=Baloo+Bhaijaan+2',
                variants: [ { name: 'عادي', family: 'Baloo Bhaijaan 2', weight: '400' }, { name: 'عريض', family: 'Baloo Bhaijaan 2', weight: '700' } ]
            },
            { 
                name: 'نوتو نسخ (Noto Naskh)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Noto+Naskh+Arabic',
                externalDownload: 'https://fonts.google.com/download?family=Noto+Naskh+Arabic',
                variants: [ { name: 'عادي', family: 'Noto Naskh Arabic', weight: '400' }, { name: 'عريض', family: 'Noto Naskh Arabic', weight: '700' } ]
            },
            { 
                name: 'نوتو سانس (Noto Sans)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Noto+Sans+Arabic',
                externalDownload: 'https://fonts.google.com/download?family=Noto+Sans+Arabic',
                variants: [ { name: 'عادي', family: 'Noto Sans Arabic', weight: '400' }, { name: 'عريض', family: 'Noto Sans Arabic', weight: '700' } ]
            },
            { 
                name: 'شهرزاد (Scheherazade New)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Scheherazade+New',
                externalDownload: 'https://fonts.google.com/download?family=Scheherazade+New',
                variants: [ { name: 'عادي', family: 'Scheherazade New', weight: '400' }, { name: 'عريض', family: 'Scheherazade New', weight: '700' } ]
            },
            { 
                name: 'هرمتان (Harmattan)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Harmattan',
                externalDownload: 'https://fonts.google.com/download?family=Harmattan',
                variants: [ { name: 'عادي', family: 'Harmattan', weight: '400' }, { name: 'عريض', family: 'Harmattan', weight: '700' } ]
            },
            { 
                name: 'أريف رقعة (Aref Ruqaa)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Aref+Ruqaa',
                externalDownload: 'https://fonts.google.com/download?family=Aref+Ruqaa',
                variants: [ { name: 'عادي', family: 'Aref Ruqaa', weight: '400' }, { name: 'عريض', family: 'Aref Ruqaa', weight: '700' } ]
            },
            { 
                name: 'فايبز (Vibes)', source: 'Google Fonts', sourceUrl: 'https://fonts.google.com/specimen/Vibes',
                externalDownload: 'https://fonts.google.com/download?family=Vibes',
                variants: [ { name: 'عادي', family: 'Vibes', weight: '400' } ]
            }
        ];

        function renderFonts() {
            fontsGrid.innerHTML = ''; 
            document.getElementById('fontSizeDisplay').innerText = currentFontSize + 'px';
            fonts.forEach((font, fontIndex) => {
                const defaultVariant = font.variants[0]; 
                const card = document.createElement('div');
                card.className = 'font-card';
                let variantsHtml = '';
                if (font.variants.length > 1) {
                    variantsHtml = `<div class="variants-container" id="variants-container-${fontIndex}">`;
                    font.variants.forEach((variant, variantIndex) => {
                        const activeClass = variantIndex === 0 ? 'active' : '';
                        variantsHtml += `<button class="variant-btn ${activeClass}" onclick="changeVariant(${fontIndex}, ${variantIndex})">${variant.name}</button>`;
                    });
                    variantsHtml += `</div>`;
                }
                card.innerHTML = `
                    <div class="font-name">${font.name}</div>
                    ${variantsHtml}
                    <div class="font-preview" id="preview-${fontIndex}" style="font-family: '${defaultVariant.family}', serif; font-weight: ${defaultVariant.weight}; font-size: ${currentFontSize}px;">
                        ${mainInput.value || defaultText}
                    </div>
                    <div class="card-footer">
                        <a href="${font.sourceUrl}" target="_blank" class="btn">المصدر</a>
                        <a href="${font.externalDownload}" target="_blank" class="btn btn-data">تحميل الخط</a>
                    </div>
                `;
                fontsGrid.appendChild(card);
            });
        }

        window.changeVariant = function(fontIndex, variantIndex) {
            const font = fonts[fontIndex];
            const variant = font.variants[variantIndex];
            const previewText = document.getElementById(`preview-${fontIndex}`);
            previewText.style.fontFamily = `'${variant.family}', serif`;
            previewText.style.fontWeight = variant.weight;
            const buttons = document.querySelectorAll(`#variants-container-${fontIndex} .variant-btn`);
            buttons.forEach((btn, index) => {
                btn.classList.toggle('active', index === variantIndex);
            });
        };

        mainInput.addEventListener('input', () => {
            const text = mainInput.value || defaultText;
            document.querySelectorAll('.font-preview').forEach(p => p.textContent = text);
        });

        window.onload = () => { loadTheme(); renderFonts(); };
    </script>
</body>
</html>

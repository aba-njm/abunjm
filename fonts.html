<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="https://image2url.com/r2/default/images/1774579668410-55391703-7184-4252-858c-3690c84902bc.jpeg" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الخطوط العربية الشاملة (49 خط)</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f4f1ea">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&family=Cairo:wght@400;700;900&family=Tajawal:wght@300;400;700&family=Almarai:wght@300;400;700;800&family=Zain:wght@400;700&family=Alexandria:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;700&family=Readex+Pro:wght@300;400;700&family=Markazi+Text:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mada:wght@400;700&family=El+Messiri:wght@400;700&family=Lemonada:wght@400;700&family=Changa:wght@400;700&family=Lalezar&family=Reem+Kufi:wght@400;700&family=Reem+Kufi+Fun:wght@400;700&family=Reem+Kufi+Ink&family=Lateef:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Jomhuria&family=Katibeh&family=Mirza:wght@400;700&family=Rakkas&family=Kufam:wght@400;700&family=Qahiri&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ruwudu:wght@400;700&family=Blaka&family=Blaka+Hollow&family=Blaka+Ink&family=Harmattan:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Aref+Ruqaa+Ink:wght@400;700&family=Vibes&family=Vazirmatn:wght@400;700&family=Marhey:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gulzar&family=Alkalami&family=Rubik+Arabic:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Momin:wght@400;700&family=Noto+Sans+Arabic+UI:wght@400;700&family=Noto+Naskh+Arabic+UI:wght@400;700&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2c2825;
            --table-bg: #fdfdfa;
            --th-bg: #e6e2d3;
            --border-color: #8c7b68;
            --border-dark: #2c2825;
            --cell-focus: #ebe7d9;
            --section-bg: #dcd7c6;
            --btn-hover-bg: #2c2825;
            --btn-hover-text: #f4f1ea;
            --action-color: #2980b9;
            --fs-btn-bg: #e6dfcd;
            --fs-btn-hover: #d4ccb6;
        }

        body.dark-mode {
            --bg-color: #1a1816;
            --text-color: #dcd7c6;
            --table-bg: #24221f;
            --th-bg: #332f2a;
            --border-color: #5c5346;
            --border-dark: #8c7b68;
            --cell-focus: #3a352f;
            --section-bg: #3f3933;
            --btn-hover-bg: #dcd7c6;
            --btn-hover-text: #1a1816;
            --action-color: #5dade2;
            --fs-btn-bg: #332f2b;
            --fs-btn-hover: #443e39;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color); font-family: 'Amiri', serif;
            margin: 0; padding: 20px; transition: background-color 0.3s, color 0.3s;
        }

        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px double var(--border-dark); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .main-title { margin: 0; font-size: 2.2em; font-family: 'Amiri', serif; text-align: right; }
        .corner-controls { display: flex; gap: 10px; }

        .btn { background-color: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 8px 12px; font-family: 'Amiri', serif; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: bold; border-radius: 4px; text-decoration: none; text-align: center;}
        .btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        .back-btn { border-style: dashed; }
        .back-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
        .fs-btn { background-color: var(--fs-btn-bg); border: 1px solid var(--border-color); font-family: 'Amiri', serif; }
        .fs-btn:hover { background-color: var(--fs-btn-hover); color: var(--text-color); }
        .btn-data { border-color: var(--action-color); color: var(--action-color); }
        .btn-data:hover { background-color: var(--action-color); color: #fff; }

        .top-controls-wrapper { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; gap: 15px; }
        
        .input-container { width: 100%; max-width: 800px; }
        .main-input { width: 100%; box-sizing: border-box; padding: 15px; font-size: 1.5em; font-family: 'Amiri', serif; background-color: var(--table-bg); color: var(--text-color); border: 2px solid var(--border-dark); border-radius: 4px; text-align: center; outline: none; transition: background-color 0.3s; }
        .main-input:focus { background-color: var(--cell-focus); border-style: dashed; }

        .size-controls { display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; font-size: 1.1em; background-color: var(--th-bg); padding: 10px 20px; border-radius: 8px; border: 1px dashed var(--border-dark); }
        .size-controls .btn { padding: 4px 15px; font-size: 1.2em; }
        .size-display { display: inline-block; min-width: 50px; text-align: center; background-color: var(--table-bg); padding: 5px 10px; border: 1px solid var(--border-color); border-radius: 4px; }

        .fonts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .font-card { background-color: var(--table-bg); border: 2px solid var(--border-dark); display: flex; flex-direction: column; transition: background-color 0.3s; }
        
        .font-name { background-color: var(--section-bg); font-weight: bold; text-align: center; font-size: 1.2em; padding: 10px; border-bottom: 2px solid var(--border-dark); direction: ltr; }
        
        .variants-container { display: flex; justify-content: center; gap: 8px; padding: 10px; background-color: var(--th-bg); flex-wrap: wrap; border-bottom: 1px dashed var(--border-color); }
        .variant-btn { background-color: transparent; border: 1px solid var(--border-dark); color: var(--text-color); padding: 4px 10px; font-family: 'Amiri', serif; font-size: 13px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .variant-btn:hover { background-color: var(--border-color); }
        .variant-btn.active { background-color: var(--action-color); color: #fff; border-color: var(--action-color); font-weight: bold; }

        .font-preview { padding: 20px; font-size: 32px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; word-wrap: break-word; flex-grow: 1; line-height: 1.5; transition: font-size 0.2s; }
        
        .card-footer { display: flex; justify-content: space-between; padding: 10px; border-top: 1px dashed var(--border-color); background-color: var(--th-bg); gap: 10px; }
        .card-footer .btn { flex: 1; font-size: 13px; }

        @media screen and (max-width: 768px) {
            .main-header { flex-direction: column-reverse; align-items: stretch; text-align: center; }
            .main-title { text-align: center; font-size: 1.8em; } 
            .fonts-grid { grid-template-columns: 1fr; }
        }

        /* تعريف خط كوكب مونو محلياً */
        @font-face { font-family: 'Kawkab-Regular'; src: url('fonts/Kawkab Mono/KawkabMono-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Kawkab-Bold'; src: url('fonts/Kawkab Mono/KawkabMono-Bold.ttf') format('truetype'); }
        @font-face { font-family: 'Kawkab-Light'; src: url('fonts/Kawkab Mono/KawkabMono-Light.ttf') format('truetype'); }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="corner-controls">
            <button class="btn back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
            <button class="btn fs-btn" id="fs-btn" onclick="toggleFullScreen()">Full Screen</button>
        </div>
        <h2 class="main-title">مكتبة الخطوط (50 خطاً)</h2>
    </div>

    <div class="top-controls-wrapper">
        <div class="input-container">
            <input type="text" id="mainInput" class="main-input" value="" placeholder="اكتب جملة لتجربتها على جميع الخطوط...">
        </div>
        <div class="size-controls">
            <span>حجم الخط:</span>
            <button class="btn" onclick="changeFontSize(4)">+</button>
            <span class="size-display" id="fontSizeDisplay">20px</span>
            <button class="btn" onclick="changeFontSize(-4)">-</button>
        </div>
    </div>

    <div class="fonts-grid" id="fontsGrid"></div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function loadTheme() {
            if (localStorage.getItem('sharedTheme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        const defaultText = "التصميم هو السفير الصامت لعلامتك التجارية";
        const mainInput = document.getElementById('mainInput');
        const fontsGrid = document.getElementById('fontsGrid');
        let currentFontSize = window.innerWidth <= 768 ? 26 : 20; 

        function changeFontSize(step) {
            currentFontSize += step;
            if (currentFontSize < 14) currentFontSize = 14;
            if (currentFontSize > 120) currentFontSize = 120;
            document.getElementById('fontSizeDisplay').innerText = currentFontSize + 'px';
            const previews = document.querySelectorAll('.font-preview');
            previews.forEach(p => p.style.fontSize = currentFontSize + 'px');
        }

        // جميع الخطوط الـ 49 من جوجل + خط كوكب مونو (الإجمالي 50)
        const fonts = [
            { name: 'Cairo', family: 'Cairo', weight: '400', url: 'Cairo' },
            { name: 'Tajawal', family: 'Tajawal', weight: '400', url: 'Tajawal' },
            { name: 'Almarai', family: 'Almarai', weight: '400', url: 'Almarai' },
            { name: 'Zain', family: 'Zain', weight: '400', url: 'Zain' },
            { name: 'Alexandria', family: 'Alexandria', weight: '400', url: 'Alexandria' },
            { name: 'IBM Plex Sans Arabic', family: 'IBM Plex Sans Arabic', weight: '400', url: 'IBM+Plex+Sans+Arabic' },
            { name: 'Readex Pro', family: 'Readex Pro', weight: '400', url: 'Readex+Pro' },
            { name: 'Markazi Text', family: 'Markazi Text', weight: '400', url: 'Markazi+Text' },
            { name: 'Mada', family: 'Mada', weight: '400', url: 'Mada' },
            { name: 'El Messiri', family: 'El Messiri', weight: '400', url: 'El+Messiri' },
            { name: 'Lemonada', family: 'Lemonada', weight: '400', url: 'Lemonada' },
            { name: 'Changa', family: 'Changa', weight: '400', url: 'Changa' },
            { name: 'Lalezar', family: 'Lalezar', weight: '400', url: 'Lalezar' },
            { name: 'Reem Kufi', family: 'Reem Kufi', weight: '400', url: 'Reem+Kufi' },
            { name: 'Reem Kufi Fun', family: 'Reem Kufi Fun', weight: '400', url: 'Reem+Kufi+Fun' },
            { name: 'Reem Kufi Ink', family: 'Reem Kufi Ink', weight: '400', url: 'Reem+Kufi+Ink' },
            { name: 'Lateef', family: 'Lateef', weight: '400', url: 'Lateef' },
            { name: 'Baloo Bhaijaan 2', family: 'Baloo Bhaijaan 2', weight: '400', url: 'Baloo+Bhaijaan+2' },
            { name: 'Noto Naskh Arabic', family: 'Noto Naskh Arabic', weight: '400', url: 'Noto+Naskh+Arabic' },
            { name: 'Noto Sans Arabic', family: 'Noto Sans Arabic', weight: '400', url: 'Noto+Sans+Arabic' },
            { name: 'Noto Kufi Arabic', family: 'Noto Kufi Arabic', weight: '400', url: 'Noto+Kufi+Arabic' },
            { name: 'Scheherazade New', family: 'Scheherazade New', weight: '400', url: 'Scheherazade+New' },
            { name: 'Jomhuria', family: 'Jomhuria', weight: '400', url: 'Jomhuria' },
            { name: 'Katibeh', family: 'Katibeh', weight: '400', url: 'Katibeh' },
            { name: 'Mirza', family: 'Mirza', weight: '400', url: 'Mirza' },
            { name: 'Rakkas', family: 'Rakkas', weight: '400', url: 'Rakkas' },
            { name: 'Kufam', family: 'Kufam', weight: '400', url: 'Kufam' },
            { name: 'Qahiri', family: 'Qahiri', weight: '400', url: 'Qahiri' },
            { name: 'Ruwudu', family: 'Ruwudu', weight: '400', url: 'Ruwudu' },
            { name: 'Blaka', family: 'Blaka', weight: '400', url: 'Blaka' },
            { name: 'Blaka Hollow', family: 'Blaka Hollow', weight: '400', url: 'Blaka+Hollow' },
            { name: 'Blaka Ink', family: 'Blaka Ink', weight: '400', url: 'Blaka+Ink' },
            { name: 'Harmattan', family: 'Harmattan', weight: '400', url: 'Harmattan' },
            { name: 'Aref Ruqaa', family: 'Aref Ruqaa', weight: '400', url: 'Aref+Ruqaa' },
            { name: 'Aref Ruqaa Ink', family: 'Aref Ruqaa Ink', weight: '400', url: 'Aref+Ruqaa+Ink' },
            { name: 'Vibes', family: 'Vibes', weight: '400', url: 'Vibes' },
            { name: 'Amiri', family: 'Amiri', weight: '400', url: 'Amiri' },
            { name: 'Amiri Quran', family: 'Amiri Quran', weight: '400', url: 'Amiri+Quran' },
            { name: 'Vazirmatn', family: 'Vazirmatn', weight: '400', url: 'Vazirmatn' },
            { name: 'Marhey', family: 'Marhey', weight: '400', url: 'Marhey' },
            { name: 'Gulzar', family: 'Gulzar', weight: '400', url: 'Gulzar' },
            { name: 'Alkalami', family: 'Alkalami', weight: '400', url: 'Alkalami' },
            { name: 'Noto Nastaliq Urdu', family: 'Noto Nastaliq Urdu', weight: '400', url: 'Noto+Nastaliq+Urdu' },
            { name: 'Rubik Arabic', family: 'Rubik Arabic', weight: '400', url: 'Rubik+Arabic' },
            { name: 'Momin', family: 'Momin', weight: '400', url: 'Momin' },
            { name: 'Noto Sans Arabic UI', family: 'Noto Sans Arabic UI', weight: '400', url: 'Noto+Sans+Arabic+UI' },
            { name: 'Noto Naskh Arabic UI', family: 'Noto Naskh Arabic UI', weight: '400', url: 'Noto+Naskh+Arabic+UI' },
            
            // إضافة الخط المحلي (كوكب مونو)
            { 
                name: 'Kawkab Mono (Local)', 
                family: 'Kawkab-Regular', 
                weight: 'normal', 
                isLocal: true,
                localUrl: 'https://makkuk.com/kawkab-mono/',
                localDownload: 'https://makkuk.com/kawkab-mono/downloads/kawkab-mono-0.500.zip',
                variants: [
                    { name: 'عادي', family: 'Kawkab-Regular', weight: 'normal' },
                    { name: 'خفيف', family: 'Kawkab-Light', weight: 'normal' },
                    { name: 'عريض', family: 'Kawkab-Bold', weight: 'normal' }
                ]
            }
        ];

        function renderFonts() {
            fontsGrid.innerHTML = ''; 
            document.getElementById('fontSizeDisplay').innerText = currentFontSize + 'px';
            
            fonts.forEach((font, fontIndex) => {
                const card = document.createElement('div');
                card.className = 'font-card';
                
                let sourceUrl = font.isLocal ? font.localUrl : `https://fonts.google.com/specimen/${font.url}`;
                let downloadUrl = font.isLocal ? font.localDownload : `https://fonts.google.com/download?family=${font.url}`;
                
                let variantsHtml = '';
                if (font.variants) { // للمحلي (كوكب)
                    variantsHtml = `<div class="variants-container" id="variants-container-${fontIndex}">`;
                    font.variants.forEach((variant, variantIndex) => {
                        const activeClass = variantIndex === 0 ? 'active' : '';
                        variantsHtml += `<button class="variant-btn ${activeClass}" onclick="changeVariant(${fontIndex}, ${variantIndex})">${variant.name}</button>`;
                    });
                    variantsHtml += `</div>`;
                } else { // لجوجل فونتس
                    variantsHtml = `
                    <div class="variants-container" id="variants-container-${fontIndex}">
                        <button class="variant-btn active" onclick="changeGoogleVariant(${fontIndex}, '400', 0)">عادي</button>
                        <button class="variant-btn" onclick="changeGoogleVariant(${fontIndex}, '700', 1)">عريض</button>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="font-name">${font.name}</div>
                    ${variantsHtml}
                    <div class="font-preview" id="preview-${fontIndex}" style="font-family: '${font.family}', serif; font-weight: ${font.weight}; font-size: ${currentFontSize}px;">
                        ${mainInput.value || defaultText}
                    </div>
                    <div class="card-footer">
                        <a href="${sourceUrl}" target="_blank" class="btn">المصدر</a>
                        <a href="${downloadUrl}" target="_blank" class="btn btn-data">تحميل الخط</a>
                    </div>
                `;
                fontsGrid.appendChild(card);
            });
        }

        window.changeVariant = function(fontIndex, variantIndex) {
            const font = fonts[fontIndex];
            const variant = font.variants[variantIndex];
            const previewText = document.getElementById(`preview-${fontIndex}`);
            previewText.style.fontFamily = `'${variant.family}', serif`;
            previewText.style.fontWeight = variant.weight;
            
            const buttons = document.querySelectorAll(`#variants-container-${fontIndex} .variant-btn`);
            buttons.forEach((btn, index) => btn.classList.toggle('active', index === variantIndex));
        };

        window.changeGoogleVariant = function(fontIndex, weight, btnIndex) {
            const previewText = document.getElementById(`preview-${fontIndex}`);
            previewText.style.fontWeight = weight;
            
            const buttons = document.querySelectorAll(`#variants-container-${fontIndex} .variant-btn`);
            buttons.forEach((btn, index) => btn.classList.toggle('active', index === btnIndex));
        };

        mainInput.addEventListener('input', () => {
            const text = mainInput.value || defaultText;
            document.querySelectorAll('.font-preview').forEach(p => p.textContent = text);
        });

        window.onload = () => { loadTheme(); renderFonts(); };
    </script>
</body>
</html>
